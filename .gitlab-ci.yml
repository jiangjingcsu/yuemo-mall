stages:
  - build
  - docker
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode -Dmaven.test.skip=true"
  DEPLOY_PATH: "/opt/software/yuemo-mall"
  BACKEND_IMAGE: "yuemo-mall-backend"
  FRONTEND_IMAGE: "yuemo-mall-frontend"

# =========================
# Backend Build
# =========================
build:backend:
  image: maven:3.9-eclipse-temurin-17
  stage: build
  cache:
    key: maven-cache
    paths:
      - .m2/repository/
  script:
    - cd yuemo-backend
    - mvn $MAVEN_CLI_OPTS clean package
  artifacts:
    paths:
      - yuemo-backend/yuemo-server/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Build
# =========================
build:frontend:
  image: node:20-alpine
  stage: build
  cache:
    key: npm-cache
    paths:
      - yuemo-frontend/node_modules/
  script:
    - cd yuemo-frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - yuemo-frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Backend Docker Build
# =========================
docker:backend:
  image: docker:27
  stage: docker
  needs:
    - build:backend
  script:
    - cd yuemo-backend
    - docker build -f Dockerfile -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker save -o ../backend.tar ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  artifacts:
    paths:
      - backend.tar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Docker Build
# =========================
docker:frontend:
  image: docker:27
  stage: docker
  needs:
    - build:frontend
  script:
    - cp -r yuemo-frontend/dist yuemo-frontend/docker/
    - cd yuemo-frontend/docker
    - docker build -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker save -o ../../frontend.tar ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  artifacts:
    paths:
      - frontend.tar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Backend
# =========================
deploy:backend:
  image: docker:27
  stage: deploy
  needs:
    - docker:backend
  script:
    - mkdir -p ${DEPLOY_PATH}/yuemo-backend/docker/nginx/conf.d
    - cp yuemo-backend/docker/docker-compose.yml ${DEPLOY_PATH}/yuemo-backend/docker/
    - cp -r yuemo-backend/docker/nginx/* ${DEPLOY_PATH}/yuemo-backend/docker/nginx/
    - docker load < backend.tar
    - docker tag ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} yuemo-mall:latest
    - docker compose -f ${DEPLOY_PATH}/yuemo-backend/docker/docker-compose.yml up -d
    - docker image prune -f
  environment:
    name: production
    url: http://192.168.1.45
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Frontend
# =========================
deploy:frontend:
  image: docker:27
  stage: deploy
  needs:
    - docker:frontend
  script:
    - mkdir -p ${DEPLOY_PATH}/yuemo-frontend/docker
    - cp yuemo-frontend/docker/docker-compose.yml ${DEPLOY_PATH}/yuemo-frontend/docker/
    - docker load < frontend.tar
    - docker tag ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} yuemo-mall-frontend:latest
    - docker compose -f ${DEPLOY_PATH}/yuemo-frontend/docker/docker-compose.yml up -d
    - docker image prune -f
  environment:
    name: production
    url: http://192.168.1.45
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml
