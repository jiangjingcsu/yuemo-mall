stages:
  - build
  - docker
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode -DfailIfNoTests=false -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DEPLOY_HOST: "${DEPLOY_HOST:-192.168.1.55}"
  DEPLOY_USER: "${DEPLOY_USER:-root}"
  DEPLOY_PATH: "/opt/software/yuemo-mall"
  REGISTRY: "192.168.1.53:5000"
  BACKEND_IMAGE: "${REGISTRY}/yuemo-mall-backend"
  FRONTEND_IMAGE: "${REGISTRY}/yuemo-mall-frontend"
  DOCKER_HOST: "unix:///var/run/docker.sock"
  SSHPASS: "${SSH_PASSWORD}"

# =========================
# Backend Build (Maven)
# =========================
build:backend:
  image: maven:3.9-eclipse-temurin-17
  stage: build
  tags: [yuemo]
  timeout: 30 minutes
  cache:
    key: maven-cache
    paths:
      - .m2/repository/
  script:
    - cd yuemo-backend
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - yuemo-backend/yuemo-server/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Build (npm)
# =========================
build:frontend:
  image: node:20-alpine
  stage: build
  tags: [yuemo]
  timeout: 15 minutes
  cache:
    key: npm-cache
    paths:
      - yuemo-frontend/node_modules/
  script:
    - cd yuemo-frontend
    - npm ci --prefer-offline --no-audit --progress=false || npm install --prefer-offline --no-audit --progress=false
    - npm run build
  artifacts:
    paths:
      - yuemo-frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Backend Docker Build
# =========================
docker:backend:
  image: docker:27
  stage: docker
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - build:backend
  before_script:
    - until docker info > /dev/null 2>&1; do echo "waiting for docker..."; sleep 2; done
  script:
    - cd yuemo-backend
    - >
      docker build
      --label "commit=${CI_COMMIT_SHA}"
      --label "branch=${CI_COMMIT_BRANCH}"
      --label "job=${CI_JOB_ID}"
      -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${BACKEND_IMAGE}:latest
      .
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BACKEND_IMAGE}:latest
  artifacts:
    paths:
      - yuemo-backend/docker/docker-compose.yml
      - yuemo-backend/docker/nginx/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Docker Build
# =========================
docker:frontend:
  image: docker:27
  stage: docker
  tags: [yuemo]
  timeout: 15 minutes
  needs:
    - build:frontend
  before_script:
    - until docker info > /dev/null 2>&1; do echo "waiting for docker..."; sleep 2; done
  script:
    - cd yuemo-frontend
    - >
      docker build
      --label "commit=${CI_COMMIT_SHA}"
      --label "branch=${CI_COMMIT_BRANCH}"
      --label "job=${CI_JOB_ID}"
      -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${FRONTEND_IMAGE}:latest
      -f docker/Dockerfile
      .
    - docker push ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${FRONTEND_IMAGE}:latest
  artifacts:
    paths:
      - yuemo-frontend/docker/docker-compose.yml
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Backend (SSH to 192.168.1.55)
# =========================
deploy:backend:
  image: alpine:3.20
  stage: deploy
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - docker:backend
  before_script:
    - apk add --no-cache openssh-client sshpass
    - '[ -z "$SSH_PASSWORD" ] && echo "ERROR: SSH_PASSWORD not set in GitLab CI/CD Variables" && exit 1 || true'
  script:
    - echo "=== Transfer configs to ${DEPLOY_HOST} ==="
    - sshpass -e scp -o StrictHostKeyChecking=no yuemo-backend/docker/docker-compose.yml ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/yuemo-backend/docker/docker-compose.yml
    - tar czf nginx-config.tar.gz -C yuemo-backend/docker nginx/
    - sshpass -e scp -o StrictHostKeyChecking=no nginx-config.tar.gz ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/nginx-config.tar.gz
    - |
      echo "=== Pull image and deploy on ${DEPLOY_HOST} ==="
      sshpass -e ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "
        set -e
        cd ${DEPLOY_PATH}/yuemo-backend/docker
        tar xzf ${DEPLOY_PATH}/nginx-config.tar.gz -C ${DEPLOY_PATH}/yuemo-backend/docker/
        docker network create backend-net 2>/dev/null || true
        echo 'Stopping conflicting containers if any...'
        for c in yuemo-mall-1 yuemo-mall-2; do
          docker stop \$c 2>/dev/null && docker rm \$c 2>/dev/null || true
        done
        docker pull ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
        IMAGE_TAG=${CI_COMMIT_SHORT_SHA} docker compose up -d --remove-orphans
        echo '${CI_COMMIT_SHA}  \$(date -u +%Y-%m-%dT%H:%M:%SZ)  ${CI_COMMIT_SHORT_SHA}' > ${DEPLOY_PATH}/.backend-version
        docker image prune -f
      "
    - |
      echo "=== Backend health check ==="
      for i in $(seq 1 20); do
        CODE=$(sshpass -e ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "curl -s -o /dev/null -w '%{http_code}' --connect-timeout 3 http://localhost:8081/doc.html 2>/dev/null || echo '000'")
        if [ "$CODE" != "000" ] && [ "$CODE" != "" ]; then
          echo "Backend responding HTTP $CODE (attempt $i)"
          exit 0
        fi
        [ $i -eq 20 ] && { echo "ERROR: Backend failed after 100s"; sshpass -e ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "docker logs yuemo-mall-1 --tail 30 2>&1; docker logs yuemo-mall-2 --tail 30 2>&1"; exit 1; }
        echo "  attempt $i/20 (HTTP $CODE), retrying in 5s..."
        sleep 5
      done
  environment:
    name: production
    url: http://192.168.1.55
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Frontend (SSH to 192.168.1.55)
# =========================
deploy:frontend:
  image: alpine:3.20
  stage: deploy
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - docker:frontend
  before_script:
    - apk add --no-cache openssh-client sshpass
    - '[ -z "$SSH_PASSWORD" ] && echo "ERROR: SSH_PASSWORD not set in GitLab CI/CD Variables" && exit 1 || true'
  script:
    - echo "=== Transfer configs to ${DEPLOY_HOST} ==="
    - sshpass -e scp -o StrictHostKeyChecking=no yuemo-frontend/docker/docker-compose.yml ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/yuemo-frontend/docker/docker-compose.yml
    - echo "=== Pull image and deploy on ${DEPLOY_HOST} ==="
    - >
      sshpass -e ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "
        set -e
        docker stop frontend-server 2>/dev/null || true
        docker rm frontend-server 2>/dev/null || true
        docker pull ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
        docker network create frontend-net 2>/dev/null || true
        cd ${DEPLOY_PATH}/yuemo-frontend/docker
        IMAGE_TAG=${CI_COMMIT_SHORT_SHA} docker compose up -d --remove-orphans
        echo '${CI_COMMIT_SHA}  \$(date -u +%Y-%m-%dT%H:%M:%SZ)  ${CI_COMMIT_SHORT_SHA}' > ${DEPLOY_PATH}/.frontend-version
        docker image prune -f
      "
    - echo "=== Frontend health check ==="
    - >
      i=1; while [ $i -le 10 ]; do
        if sshpass -e ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "wget -q -O- http://localhost:8080" | grep -q '<html'; then
          echo "Frontend healthy (attempt $i)"; exit 0;
        fi;
        if [ $i -eq 10 ]; then
          echo "ERROR: Frontend failed after 30s";
          sshpass -e ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "cd ${DEPLOY_PATH}/yuemo-frontend/docker && docker compose logs --tail=20";
          exit 1;
        fi;
        echo "  attempt $i/10, retrying in 3s...";
        sleep 3;
        i=$((i+1));
      done
  environment:
    name: production
    url: http://192.168.1.55
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml
