stages:
  - build
  - package
  - deploy

variables:
  MAVEN_CLI_OPTS: "-s .m2/settings.xml --batch-mode -Dmaven.test.skip=true"
  DOCKER_IMAGE_BACKEND: $CI_REGISTRY_IMAGE/yuemo-mall-backend
  DOCKER_IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/yuemo-mall-frontend
  DEPLOY_HOST: "192.168.1.45"
  DEPLOY_USER: "root"

.build_backend:
  image: maven:3.9-eclipse-temurin-17
  stage: build
  script:
    - cd yuemo-backend
    - mvn $MAVEN_CLI_OPTS clean package
  artifacts:
    paths:
      - yuemo-backend/yuemo-server/target/*.jar
      - yuemo-backend/yuemo-gateway/target/*.jar
    expire_in: 1 hour

.build_frontend:
  image: node:20-alpine
  stage: build
  script:
    - cd yuemo-frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - yuemo-frontend/dist/
    expire_in: 1 hour

.package_backend:
  image: docker:27
  stage: package
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - cd yuemo-backend
    - docker build
      --build-arg JAR_FILE=yuemo-gateway/target/yuemo-gateway-*.jar
      -t $DOCKER_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA
      -t $DOCKER_IMAGE_BACKEND:latest
      .
    - docker push $DOCKER_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE_BACKEND:latest

.package_frontend:
  image: docker:27
  stage: package
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - cd yuemo-frontend
    - |
      cat > Dockerfile <<'EOF'
      FROM nginx:1.24-alpine
      COPY dist/ /usr/share/nginx/html/
      EXPOSE 80
      EOF
    - docker build -t $DOCKER_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA -t $DOCKER_IMAGE_FRONTEND:latest .
    - docker push $DOCKER_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE_FRONTEND:latest

.deploy:
  image: alpine:3.20
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
  script:
    - ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY &&
        cd /opt/yuemo-mall &&
        docker compose pull &&
        docker compose up -d --remove-orphans &&
        docker image prune -f
      "

build:backend:
  extends: .build_backend
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - yuemo-backend/**/*

build:frontend:
  extends: .build_frontend
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - yuemo-frontend/**/*

package:backend:
  extends: .package_backend
  needs: [build:backend]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*

package:frontend:
  extends: .package_frontend
  needs: [build:frontend]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*

deploy:production:
  extends: .deploy
  needs:
    - job: package:backend
      optional: true
    - job: package:frontend
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  environment:
    name: production
    url: http://192.168.1.45
