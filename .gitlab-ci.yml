stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode -Dmaven.test.skip=true"
  DEPLOY_HOST: "192.168.1.45"
  DEPLOY_USER: "root"
  DEPLOY_PATH: "/opt/yuemo-mall"

.build_backend:
  image: maven:3.9-eclipse-temurin-17
  stage: build
  cache:
    key: maven-cache
    paths:
      - .m2/repository/
  script:
    - cd yuemo-backend
    - mvn $MAVEN_CLI_OPTS clean package
  artifacts:
    paths:
      - yuemo-backend/yuemo-server/target/*.jar
    expire_in: 1 hour

.build_frontend:
  image: node:20-alpine
  stage: build
  cache:
    key: npm-cache
    paths:
      - yuemo-frontend/node_modules/
  script:
    - cd yuemo-frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - yuemo-frontend/dist/
    expire_in: 1 hour

.deploy_backend:
  image: alpine:3.20
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
  script:
    - rsync -az --delete yuemo-backend/ ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/yuemo-backend/
    - ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        cd ${DEPLOY_PATH}/yuemo-backend/docker &&
        docker compose build yuemo-mall-1 &&
        docker compose up -d --no-deps --build yuemo-mall-1 yuemo-mall-2 &&
        docker image prune -f
      "

.deploy_frontend:
  image: alpine:3.20
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
  script:
    - rsync -az --delete yuemo-frontend/dist/ ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/yuemo-frontend/dist/
    - ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        cd ${DEPLOY_PATH}/yuemo-frontend &&
        docker compose up -d --no-deps --build nginx-frontend &&
        docker image prune -f
      "

build:backend:
  extends: .build_backend
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - yuemo-backend/**/*

build:frontend:
  extends: .build_frontend
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - changes:
        - yuemo-frontend/**/*

deploy:backend:
  extends: .deploy_backend
  needs: [build:backend]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
  environment:
    name: production
    url: http://192.168.1.45

deploy:frontend:
  extends: .deploy_frontend
  needs: [build:frontend]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
  environment:
    name: production
    url: http://192.168.1.45
