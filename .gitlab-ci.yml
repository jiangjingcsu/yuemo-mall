stages:
  - build
  - docker
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode -DfailIfNoTests=false -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DEPLOY_HOST: "${DEPLOY_HOST:-192.168.1.45}"
  DEPLOY_USER: "${DEPLOY_USER:-root}"
  DEPLOY_PATH: "/opt/software/yuemo-mall"
  BACKEND_IMAGE: "yuemo-mall-backend"
  FRONTEND_IMAGE: "yuemo-mall-frontend"
  DOCKER_HOST: "unix:///var/run/docker.sock"

# =========================
# Backend Build (Maven)
# =========================
build:backend:
  image: maven:3.9-eclipse-temurin-17
  stage: build
  tags: [yuemo]
  timeout: 30 minutes
  cache:
    key: maven-cache
    paths:
      - .m2/repository/
  script:
    - cd yuemo-backend
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - yuemo-backend/yuemo-server/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Build (npm)
# =========================
build:frontend:
  image: node:20-alpine
  stage: build
  tags: [yuemo]
  timeout: 15 minutes
  cache:
    key: npm-cache
    paths:
      - yuemo-frontend/node_modules/
  script:
    - cd yuemo-frontend
    - npm ci --prefer-offline --no-audit --progress=false || npm install --prefer-offline --no-audit --progress=false
    - npm run build
  artifacts:
    paths:
      - yuemo-frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Backend Docker Build
# =========================
docker:backend:
  image: docker:27
  stage: docker
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - build:backend
  before_script:
    - until docker info > /dev/null 2>&1; do echo "waiting for docker..."; sleep 2; done
  script:
    - cd yuemo-backend
    - >
      docker build
      --label "commit=${CI_COMMIT_SHA}"
      --label "branch=${CI_COMMIT_BRANCH}"
      --label "job=${CI_JOB_ID}"
      -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${BACKEND_IMAGE}:latest
      .
    - docker save -o ../backend.tar ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  artifacts:
    paths:
      - backend.tar
      - yuemo-backend/docker/docker-compose.yml
      - yuemo-backend/docker/nginx/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Docker Build
# =========================
docker:frontend:
  image: docker:27
  stage: docker
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - build:frontend
  before_script:
    - until docker info > /dev/null 2>&1; do echo "waiting for docker..."; sleep 2; done
  script:
    - cp -r yuemo-frontend/dist yuemo-frontend/docker/
    - cd yuemo-frontend/docker
    - >
      docker build
      --label "commit=${CI_COMMIT_SHA}"
      --label "branch=${CI_COMMIT_BRANCH}"
      --label "job=${CI_JOB_ID}"
      -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${FRONTEND_IMAGE}:latest
      .
    - docker save -o ../../frontend.tar ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  artifacts:
    paths:
      - frontend.tar
      - yuemo-frontend/docker/docker-compose.yml
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Backend (SSH to 192.168.1.45)
# =========================
deploy:backend:
  image: alpine:3.20
  stage: deploy
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - docker:backend
  before_script:
    - apk add --no-cache openssh-client
    - test -n "$SSH_PRIVATE_KEY" || { echo "ERROR: CI variable SSH_PRIVATE_KEY is not set"; exit 1; }
    - test -n "$DB_PASS" || { echo "ERROR: CI variable DB_PASS is not set"; exit 1; }
    - test -n "$JWT_SECRET" || { echo "ERROR: CI variable JWT_SECRET is not set"; exit 1; }
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ecdsa_ci
    - chmod 600 ~/.ssh/id_ecdsa_ci
    - test -n "$SSH_KNOWN_HOSTS" && echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - |
      cat > ~/.ssh/config << SSHCONF
      Host deploy
        HostName ${DEPLOY_HOST}
        User ${DEPLOY_USER}
        IdentityFile ~/.ssh/id_ecdsa_ci
        StrictHostKeyChecking no
        ConnectTimeout 10
      SSHCONF
    - chmod 600 ~/.ssh/config
  script:
    - |
      echo "=== Transfer artifacts to ${DEPLOY_HOST} ==="
      scp backend.tar deploy:${DEPLOY_PATH}/backend.tar
      scp yuemo-backend/docker/docker-compose.yml deploy:${DEPLOY_PATH}/yuemo-backend/docker/docker-compose.yml
      scp -r yuemo-backend/docker/nginx/ deploy:${DEPLOY_PATH}/yuemo-backend/docker/nginx/
    - |
      echo "=== Load image and deploy on ${DEPLOY_HOST} ==="
      ssh deploy "
        set -e
        cd ${DEPLOY_PATH}/yuemo-backend/docker
        echo 'Stopping conflicting containers if any...'
        for c in yuemo-mall-1 yuemo-mall-2 yuemo-nginx redis-1 redis-2 redis-3 rocketmq-ns rocketmq-broker sentinel-dashboard; do
          docker stop \$c 2>/dev/null && docker rm \$c 2>/dev/null || true
        done
        docker load < ${DEPLOY_PATH}/backend.tar
        docker tag ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} yuemo-mall:latest
        DB_PASS='${DB_PASS}' JWT_SECRET='${JWT_SECRET}' REDIS_PASSWORD='${REDIS_PASSWORD:-}' docker compose up -d --pull never --remove-orphans
        echo '${CI_COMMIT_SHA}  \$(date -u +%Y-%m-%dT%H:%M:%SZ)  ${CI_COMMIT_SHORT_SHA}' > ${DEPLOY_PATH}/.backend-version
        docker image prune -f
      "
    - |
      echo "=== Backend health check ==="
      for i in $(seq 1 20); do
        if ssh deploy "wget -q -O- http://localhost:8081/actuator/health 2>/dev/null" | grep -q UP; then
          echo "Backend healthy (attempt $i)"
          exit 0
        fi
        [ $i -eq 20 ] && { echo "ERROR: Backend failed after 100s"; ssh deploy "cd ${DEPLOY_PATH}/yuemo-backend/docker && docker compose logs --tail=30"; exit 1; }
        echo "  attempt $i/20, retrying in 5s..."
        sleep 5
      done
  environment:
    name: production
    url: http://192.168.1.45
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Frontend (SSH to 192.168.1.45)
# =========================
deploy:frontend:
  image: alpine:3.20
  stage: deploy
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - docker:frontend
  before_script:
    - apk add --no-cache openssh-client
    - test -n "$SSH_PRIVATE_KEY" || { echo "ERROR: CI variable SSH_PRIVATE_KEY is not set"; exit 1; }
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ecdsa_ci
    - chmod 600 ~/.ssh/id_ecdsa_ci
    - test -n "$SSH_KNOWN_HOSTS" && echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - |
      cat > ~/.ssh/config << SSHCONF
      Host deploy
        HostName ${DEPLOY_HOST}
        User ${DEPLOY_USER}
        IdentityFile ~/.ssh/id_ecdsa_ci
        StrictHostKeyChecking no
        ConnectTimeout 10
      SSHCONF
    - chmod 600 ~/.ssh/config
  script:
    - |
      echo "=== Transfer artifacts to ${DEPLOY_HOST} ==="
      scp frontend.tar deploy:${DEPLOY_PATH}/frontend.tar
      scp yuemo-frontend/docker/docker-compose.yml deploy:${DEPLOY_PATH}/yuemo-frontend/docker/docker-compose.yml
    - |
      echo "=== Load image and deploy on ${DEPLOY_HOST} ==="
      ssh deploy "
        set -e
        echo 'Stopping conflicting containers if any...'
        docker stop nginx-frontend 2>/dev/null && docker rm nginx-frontend 2>/dev/null || true
        docker load < ${DEPLOY_PATH}/frontend.tar
        docker tag ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} yuemo-mall-frontend:latest
        cd ${DEPLOY_PATH}/yuemo-frontend/docker && docker compose up -d --pull never --remove-orphans
        echo '${CI_COMMIT_SHA}  \$(date -u +%Y-%m-%dT%H:%M:%SZ)  ${CI_COMMIT_SHORT_SHA}' > ${DEPLOY_PATH}/.frontend-version
        docker image prune -f
      "
    - |
      echo "=== Frontend health check ==="
      for i in $(seq 1 10); do
        if ssh deploy "wget -q -O- http://localhost:8080 2>/dev/null" | grep -q '<html'; then
          echo "Frontend healthy (attempt $i)"
          exit 0
        fi
        [ $i -eq 10 ] && { echo "ERROR: Frontend failed after 30s"; ssh deploy "cd ${DEPLOY_PATH}/yuemo-frontend/docker && docker compose logs --tail=20"; exit 1; }
        echo "  attempt $i/10, retrying in 3s..."
        sleep 3
      done
  environment:
    name: production
    url: http://192.168.1.45
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml
