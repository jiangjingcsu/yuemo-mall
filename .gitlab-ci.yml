stages:
  - build
  - docker
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode -DfailIfNoTests=false -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DEPLOY_HOST: "${DEPLOY_HOST:-192.168.1.55}"
  DEPLOY_USER: "${DEPLOY_USER:-root}"
  DEPLOY_PATH: "/opt/software/yuemo-mall"
  BACKEND_IMAGE: "yuemo-mall-backend"
  FRONTEND_IMAGE: "yuemo-mall-frontend"
  DOCKER_HOST: "unix:///var/run/docker.sock"

# =========================
# Backend Build (Maven)
# =========================
build:backend:
  image: maven:3.9-eclipse-temurin-17
  stage: build
  tags: [yuemo]
  timeout: 30 minutes
  cache:
    key: maven-cache
    paths:
      - .m2/repository/
  script:
    - cd yuemo-backend
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - yuemo-backend/yuemo-server/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Build (npm)
# =========================
build:frontend:
  image: node:20-alpine
  stage: build
  tags: [yuemo]
  timeout: 15 minutes
  cache:
    key: npm-cache
    paths:
      - yuemo-frontend/node_modules/
  script:
    - cd yuemo-frontend
    - npm ci --prefer-offline --no-audit --progress=false || npm install --prefer-offline --no-audit --progress=false
    - npm run build
  artifacts:
    paths:
      - yuemo-frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Backend Docker Build
# =========================
docker:backend:
  image: docker:27
  stage: docker
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - build:backend
  before_script:
    - until docker info > /dev/null 2>&1; do echo "waiting for docker..."; sleep 2; done
  script:
    - cd yuemo-backend
    - >
      docker build
      --label "commit=${CI_COMMIT_SHA}"
      --label "branch=${CI_COMMIT_BRANCH}"
      --label "job=${CI_JOB_ID}"
      -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${BACKEND_IMAGE}:latest
      .
    - docker save ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} | gzip > ../backend.tar.gz
  artifacts:
    paths:
      - backend.tar.gz
      - yuemo-backend/docker/docker-compose.yml
      - yuemo-backend/docker/nginx/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Docker Build
# =========================
docker:frontend:
  image: docker:27
  stage: docker
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - build:frontend
  before_script:
    - until docker info > /dev/null 2>&1; do echo "waiting for docker..."; sleep 2; done
  script:
    - cp -r yuemo-frontend/dist yuemo-frontend/docker/
    - cd yuemo-frontend/docker
    - >
      docker build
      --label "commit=${CI_COMMIT_SHA}"
      --label "branch=${CI_COMMIT_BRANCH}"
      --label "job=${CI_JOB_ID}"
      -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
      -t ${FRONTEND_IMAGE}:latest
      .
    - docker save ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} | gzip > ../../frontend.tar.gz
  artifacts:
    paths:
      - frontend.tar.gz
      - yuemo-frontend/docker/docker-compose.yml
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Backend (SSH to 192.168.1.55)
# =========================
deploy:backend:
  image: alpine:3.20
  stage: deploy
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - docker:backend
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ecdsa_ci
    - chmod 600 ~/.ssh/id_ecdsa_ci
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - printf "Host deploy\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/id_ecdsa_ci\n  StrictHostKeyChecking no\n  ConnectTimeout 10\n" "$DEPLOY_HOST" "$DEPLOY_USER" > ~/.ssh/config
    - chmod 600 ~/.ssh/config
    - '[ -z "$SSH_PRIVATE_KEY" ] && echo "ERROR: SSH_PRIVATE_KEY not set" && exit 1 || true'
    - '[ -z "$DB_PASS" ] && echo "ERROR: DB_PASS not set" && exit 1 || true'
    - '[ -z "$JWT_SECRET" ] && echo "ERROR: JWT_SECRET not set" && exit 1 || true'
  script:
    - echo "=== Transfer artifacts to ${DEPLOY_HOST} ==="
    - scp backend.tar.gz deploy:${DEPLOY_PATH}/backend.tar.gz
    - scp yuemo-backend/docker/docker-compose.yml deploy:${DEPLOY_PATH}/yuemo-backend/docker/docker-compose.yml
    - tar czf nginx-config.tar.gz -C yuemo-backend/docker nginx/
    - scp nginx-config.tar.gz deploy:${DEPLOY_PATH}/nginx-config.tar.gz
    - |
      echo "=== Load image and deploy on ${DEPLOY_HOST} ==="
      ssh deploy "
        set -e
        cd ${DEPLOY_PATH}/yuemo-backend/docker
        echo 'Stopping conflicting containers if any...'
        for c in yuemo-mall-1 yuemo-mall-2 yuemo-nginx redis-1 redis-2 redis-3 rocketmq-ns rocketmq-broker sentinel-dashboard; do
          docker stop \$c 2>/dev/null && docker rm \$c 2>/dev/null || true
        done
        tar xzf ${DEPLOY_PATH}/nginx-config.tar.gz -C ${DEPLOY_PATH}/yuemo-backend/docker/
        gunzip -c ${DEPLOY_PATH}/backend.tar.gz | docker load
        docker tag ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} yuemo-mall:latest
        docker pull bladex/sentinel-dashboard:1.8.6 2>/dev/null || true
        DB_PASS='${DB_PASS}' JWT_SECRET='${JWT_SECRET}' REDIS_PASSWORD='${REDIS_PASSWORD:-}' docker compose up -d --pull never --remove-orphans
        echo '${CI_COMMIT_SHA}  \$(date -u +%Y-%m-%dT%H:%M:%SZ)  ${CI_COMMIT_SHORT_SHA}' > ${DEPLOY_PATH}/.backend-version
        docker image prune -f
      "
    - |
      echo "=== Backend health check ==="
      for i in $(seq 1 20); do
        CODE=$(ssh deploy "curl -s -o /dev/null -w '%{http_code}' --connect-timeout 3 http://localhost:8081/doc.html 2>/dev/null || echo '000'")
        if [ "$CODE" != "000" ] && [ "$CODE" != "" ]; then
          echo "Backend responding HTTP $CODE (attempt $i)"
          exit 0
        fi
        [ $i -eq 20 ] && { echo "ERROR: Backend failed after 100s"; ssh deploy "docker logs yuemo-mall-1 --tail 30 2>&1; docker logs yuemo-mall-2 --tail 30 2>&1"; exit 1; }
        echo "  attempt $i/20 (HTTP $CODE), retrying in 5s..."
        sleep 5
      done
  environment:
    name: production
    url: http://192.168.1.55
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Frontend (SSH to 192.168.1.55)
# =========================
deploy:frontend:
  image: alpine:3.20
  stage: deploy
  tags: [yuemo]
  timeout: 10 minutes
  needs:
    - docker:frontend
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ecdsa_ci
    - chmod 600 ~/.ssh/id_ecdsa_ci
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - printf "Host deploy\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/id_ecdsa_ci\n  StrictHostKeyChecking no\n  ConnectTimeout 10\n" "$DEPLOY_HOST" "$DEPLOY_USER" > ~/.ssh/config
    - chmod 600 ~/.ssh/config
    - '[ -z "$SSH_PRIVATE_KEY" ] && echo "ERROR: SSH_PRIVATE_KEY not set" && exit 1 || true'
  script:
    - echo "=== Transfer artifacts to ${DEPLOY_HOST} ==="
    - scp frontend.tar.gz deploy:${DEPLOY_PATH}/frontend.tar.gz
    - scp yuemo-frontend/docker/docker-compose.yml deploy:${DEPLOY_PATH}/yuemo-frontend/docker/docker-compose.yml
    - echo "=== Load image and deploy on ${DEPLOY_HOST} ==="
    - >
      ssh deploy "
        set -e
        docker stop nginx-frontend 2>/dev/null || true
        docker rm nginx-frontend 2>/dev/null || true
        gunzip -c ${DEPLOY_PATH}/frontend.tar.gz | docker load
        docker tag ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} yuemo-mall-frontend:latest
        docker network create yuemo-net 2>/dev/null || true
        cd ${DEPLOY_PATH}/yuemo-frontend/docker
        docker compose up -d --pull never --remove-orphans
        echo '${CI_COMMIT_SHA}  \$(date -u +%Y-%m-%dT%H:%M:%SZ)  ${CI_COMMIT_SHORT_SHA}' > ${DEPLOY_PATH}/.frontend-version
        docker image prune -f
      "
    - echo "=== Frontend health check ==="
    - >
      i=1; while [ $i -le 10 ]; do
        if ssh deploy "wget -q -O- http://localhost:8080" | grep -q '<html'; then
          echo "Frontend healthy (attempt $i)"; exit 0;
        fi;
        if [ $i -eq 10 ]; then
          echo "ERROR: Frontend failed after 30s";
          ssh deploy "cd ${DEPLOY_PATH}/yuemo-frontend/docker && docker compose logs --tail=20";
          exit 1;
        fi;
        echo "  attempt $i/10, retrying in 3s...";
        sleep 3;
        i=$((i+1));
      done
  environment:
    name: production
    url: http://192.168.1.55
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml
