stages:
  - build
  - docker
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode -Dmaven.test.skip=true"
  DEPLOY_HOST: "192.168.1.45"
  DEPLOY_USER: "root"
  DEPLOY_PATH: "/opt/software/yuemo-mall"
  BACKEND_IMAGE: "yuemo-mall-backend"
  FRONTEND_IMAGE: "yuemo-mall-frontend"

# =========================
# Backend Build
# =========================
build:backend:
  image: maven:3.9-eclipse-temurin-17
  stage: build
  cache:
    key: maven-cache
    paths:
      - .m2/repository/
  script:
    - cd yuemo-backend
    - mvn $MAVEN_CLI_OPTS clean package
  artifacts:
    paths:
      - yuemo-backend/yuemo-server/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Build
# =========================
build:frontend:
  image: node:20-alpine
  stage: build
  cache:
    key: npm-cache
    paths:
      - yuemo-frontend/node_modules/
  script:
    - cd yuemo-frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - yuemo-frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Backend Docker Build
# =========================
docker:backend:
  image: docker:27
  stage: docker
  needs:
    - build:backend
  script:
    - cd yuemo-backend
    - docker build -f Dockerfile -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker save -o ../backend.tar ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  artifacts:
    paths:
      - backend.tar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Frontend Docker Build
# =========================
docker:frontend:
  image: docker:27
  stage: docker
  needs:
    - build:frontend
  script:
    - cp -r yuemo-frontend/dist yuemo-frontend/docker/
    - cd yuemo-frontend/docker
    - docker build -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker save -o ../../frontend.tar ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
  artifacts:
    paths:
      - frontend.tar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Backend
# =========================
deploy:backend:
  image: alpine:3.20
  stage: deploy
  needs:
    - docker:backend
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
  script:
    - ssh ${DEPLOY_USER}@${DEPLOY_HOST} "mkdir -p ${DEPLOY_PATH}/yuemo-backend/docker/nginx/conf.d"
    - scp yuemo-backend/docker/docker-compose.yml ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/yuemo-backend/docker/
    - scp -r yuemo-backend/docker/nginx/* ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/yuemo-backend/docker/nginx/
    - scp backend.tar ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/
    - |
      ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        docker load < ${DEPLOY_PATH}/backend.tar &&
        docker tag ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} yuemo-mall:latest &&
        docker compose -f ${DEPLOY_PATH}/yuemo-backend/docker/docker-compose.yml up -d &&
        docker image prune -f
      "
  environment:
    name: production
    url: http://192.168.1.45
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-backend/**/*
        - .gitlab-ci.yml

# =========================
# Deploy Frontend
# =========================
deploy:frontend:
  image: alpine:3.20
  stage: deploy
  needs:
    - docker:frontend
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" > ~/.ssh/config
  script:
    - ssh ${DEPLOY_USER}@${DEPLOY_HOST} "mkdir -p ${DEPLOY_PATH}/yuemo-frontend/docker"
    - scp yuemo-frontend/docker/docker-compose.yml ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/yuemo-frontend/docker/
    - scp frontend.tar ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/
    - |
      ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
        docker load < ${DEPLOY_PATH}/frontend.tar &&
        docker tag ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} yuemo-mall-frontend:latest &&
        docker compose -f ${DEPLOY_PATH}/yuemo-frontend/docker/docker-compose.yml up -d &&
        docker image prune -f
      "
  environment:
    name: production
    url: http://192.168.1.45
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - yuemo-frontend/**/*
        - .gitlab-ci.yml
