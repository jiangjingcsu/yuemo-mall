server {
    listen 80;
    server_name api.yuemo.com;

    limit_conn conn_limit 100;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'; connect-src 'self'" always;
    # HSTS - 取消注释以启用（需先配置 HTTPS）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/user/login {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://mall_backend;
        include /etc/nginx/proxy_params;
    }

    location /api/user/register {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://mall_backend;
        include /etc/nginx/proxy_params;
    }

    location /api/order/ {
        limit_req zone=order_limit burst=20 nodelay;
        proxy_pass http://mall_backend;
        include /etc/nginx/proxy_params;
    }

    location /api/ {
        proxy_pass http://mall_backend;
        include /etc/nginx/proxy_params;
    }

    # 静态资源
    location /static/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 健康检查
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

server {
    listen 80;
    server_name _;
    return 444;
}
