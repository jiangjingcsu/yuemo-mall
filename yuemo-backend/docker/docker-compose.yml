name: yuemo-backend

services:
  yuemo-mall-1:
    image: 192.168.1.53/yuemo-mall/backend:${IMAGE_TAG:-latest}
    container_name: yuemo-mall-1
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ROCKETMQ_NS=${ROCKETMQ_NS}
      - SENTINEL_DASHBOARD=${SENTINEL_DASHBOARD}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./logs/yuemo-mall-1:/app/logs
    ports:
      - "8081:8080"
    restart: always
    networks:
      - backend-net

  yuemo-mall-2:
    image: 192.168.1.53/yuemo-mall/backend:${IMAGE_TAG:-latest}
    container_name: yuemo-mall-2
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ROCKETMQ_NS=${ROCKETMQ_NS}
      - SENTINEL_DASHBOARD=${SENTINEL_DASHBOARD}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./logs/yuemo-mall-2:/app/logs
    ports:
      - "8082:8080"
    restart: always
    networks:
      - backend-net

networks:
  backend-net:
    external: true
