services:
  yuemo-mall-1:
    image: ${CI_REGISTRY:-192.168.1.54:5050}/jiangjingcsu/yuemo-mall/yuemo-mall-backend:${IMAGE_TAG:-latest}
    container_name: yuemo-mall-1
    environment:
      - DB_HOST=${DB_HOST:-192.168.1.56}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-jiangjing}
      - REDIS_HOST=${REDIS_HOST:-192.168.1.56}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-jiangjing}
      - ROCKETMQ_NS=${ROCKETMQ_NS:-192.168.1.56:9876}
      - SENTINEL_DASHBOARD=${SENTINEL_DASHBOARD:-192.168.1.56:8080}
      - JWT_SECRET=${JWT_SECRET:-yuemo-mall-jwt-secret-2024}
    ports:
      - "8081:8080"
    restart: always
    networks:
      - backend-net

  yuemo-mall-2:
    image: ${CI_REGISTRY:-192.168.1.54:5050}/jiangjingcsu/yuemo-mall/yuemo-mall-backend:${IMAGE_TAG:-latest}
    container_name: yuemo-mall-2
    environment:
      - DB_HOST=${DB_HOST:-192.168.1.56}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-jiangjing}
      - REDIS_HOST=${REDIS_HOST:-192.168.1.56}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-jiangjing}
      - ROCKETMQ_NS=${ROCKETMQ_NS:-192.168.1.56:9876}
      - SENTINEL_DASHBOARD=${SENTINEL_DASHBOARD:-192.168.1.56:8080}
      - JWT_SECRET=${JWT_SECRET:-yuemo-mall-jwt-secret-2024}
    ports:
      - "8082:8080"
    restart: always
    networks:
      - backend-net

networks:
  backend-net:
    external: true
