services:
  # ============ 月魔商城 单体应用（多副本） ============
  yuemo-mall-1:
    build:
      context: ..
      dockerfile: Dockerfile
    image: yuemo-mall:latest
    container_name: yuemo-mall-1
    environment:
      - DB_HOST=${DB_HOST:-192.168.1.45}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-jiangjing}
      - SPRING_DATA_REDIS_CLUSTER_NODES=redis-1:6379,redis-2:6379,redis-3:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ROCKETMQ_NS=rocketmq-ns:9876
      - SENTINEL_DASHBOARD=sentinel-dashboard:8080
      - JWT_SECRET=${JWT_SECRET:-yuemo-mall-production-secret-key-change-me!!}
    ports:
      - "8081:8080"
    restart: always
    networks:
      - yuemo-net

  yuemo-mall-2:
    image: yuemo-mall:latest
    container_name: yuemo-mall-2
    environment:
      - DB_HOST=${DB_HOST:-192.168.1.45}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-jiangjing}
      - SPRING_DATA_REDIS_CLUSTER_NODES=redis-1:6379,redis-2:6379,redis-3:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ROCKETMQ_NS=rocketmq-ns:9876
      - SENTINEL_DASHBOARD=sentinel-dashboard:8080
      - JWT_SECRET=${JWT_SECRET:-yuemo-mall-production-secret-key-change-me!!}
    ports:
      - "8082:8080"
    restart: always
    networks:
      - yuemo-net

  # ============ Nginx 负载均衡 ============
  nginx:
    image: nginx:1.24-alpine
    container_name: yuemo-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    depends_on:
      - yuemo-mall-1
      - yuemo-mall-2
    restart: always
    networks:
      - yuemo-net

  # ============ Redis Cluster ============
  redis-1:
    image: redis:7.0
    container_name: redis-1
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass ${REDIS_PASSWORD:-jiangjing}
    ports:
      - "6379:6379"
    volumes:
      - redis-1-data:/data
    restart: always
    networks:
      - yuemo-net

  redis-2:
    image: redis:7.0
    container_name: redis-2
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass ${REDIS_PASSWORD:-jiangjing}
    volumes:
      - redis-2-data:/data
    restart: always
    networks:
      - yuemo-net

  redis-3:
    image: redis:7.0
    container_name: redis-3
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --requirepass ${REDIS_PASSWORD:-jiangjing}
    volumes:
      - redis-3-data:/data
    restart: always
    networks:
      - yuemo-net

  # ============ RocketMQ ============
  rocketmq-ns:
    image: apache/rocketmq:5.3.1
    container_name: rocketmq-ns
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    restart: always
    networks:
      - yuemo-net

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: rocketmq-broker
    environment:
      - NAMESRV_ADDR=rocketmq-ns:9876
    command: sh mqbroker -n rocketmq-ns:9876
    ports:
      - "10909:10909"
      - "10911:10911"
    depends_on:
      - rocketmq-ns
    restart: always
    networks:
      - yuemo-net

  # ============ Sentinel Dashboard ============
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: sentinel-dashboard
    ports:
      - "8858:8080"
    restart: always
    networks:
      - yuemo-net

volumes:
  redis-1-data:
  redis-2-data:
  redis-3-data:

networks:
  yuemo-net:
    driver: bridge
