services:
  yuemo-mall-1:
    image: yuemo-mall:latest
    container_name: yuemo-mall-1
    environment:
      - DB_HOST=${DB_HOST:-192.168.1.45}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:?DB_PASS must be set}
      - REDIS_HOST=${REDIS_HOST:-192.168.1.45}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ROCKETMQ_NS=${ROCKETMQ_NS:-192.168.1.45:9876}
      - SENTINEL_DASHBOARD=${SENTINEL_DASHBOARD:-192.168.1.45:8080}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
    ports:
      - "8081:8080"
    restart: always
    networks:
      - yuemo-net

  yuemo-mall-2:
    image: yuemo-mall:latest
    container_name: yuemo-mall-2
    environment:
      - DB_HOST=${DB_HOST:-192.168.1.45}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:?DB_PASS must be set}
      - REDIS_HOST=${REDIS_HOST:-192.168.1.45}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ROCKETMQ_NS=${ROCKETMQ_NS:-192.168.1.45:9876}
      - SENTINEL_DASHBOARD=${SENTINEL_DASHBOARD:-192.168.1.45:8080}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
    ports:
      - "8082:8080"
    restart: always
    networks:
      - yuemo-net

  nginx:
    image: nginx:1.24-alpine
    container_name: yuemo-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
    ports:
      - "80:80"
    depends_on:
      - yuemo-mall-1
      - yuemo-mall-2
    restart: always
    networks:
      - yuemo-net

networks:
  yuemo-net:
    external: true
